<div class="splide" role="group" aria-label="Top Page Slides">
    <div class="splide__track">
        <ul class="splide__list">
            {{ if ge hugo.Version "0.156.0" }}
                {{ range hugo.Data.slide }}
                <li class="splide__slide">
                    <img src="{{ .image | relURL }}" alt="{{ .alt }}">
                    <div class="s-fade-txt">
                        <h1 class="text-4xl font-medium {{ or .color "text-white" }}">{{ .title }}</h1>
                    </div>
                </li>
                {{ end }}
            {{ else }}
                {{ range .Site.Data.slide }}
                <li class="splide__slide">
                    <img src="{{ .image | relURL }}" alt="{{ .alt }}">
                    <div class="s-fade-txt">
                        <h1 class="text-4xl font-medium {{ or .color "text-white" }}">{{ .title }}</h1>
                    </div>
                </li>
                {{ end }}
            {{ end }}
        </ul>
    </div>
</div>
